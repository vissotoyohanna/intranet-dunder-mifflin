<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Funcionário | Dunder Mifflin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body class="body-login">

    <div class="login-container" style="margin-top: 2rem; margin-bottom: 2rem;">
        <div class="login-box" style="width: 450px;">
            
            <div style="text-align: center; margin-bottom: 20px;">
                <a href="/painel" style="color: #0f172a; text-decoration: none;">← Cancelar Edição</a>
            </div>

            <h2>Atualizar Cadastro</h2>
            <p>Modificando os dados de: <strong>{{ f.nome }}</strong></p>

            <form action="/editar/{{ f.id }}" method="POST">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" value="{{ f.nome }}" required>
                </div>

                <div class="input-group">
                    <label>Cargo</label>
                    <input type="text" name="cargo" value="{{ f.cargo }}" required>
                </div>

                <div class="input-group">
                    <label>Departamento</label>
                    <input type="text" name="departamento" value="{{ f.departamento }}" required>
                </div>

                <div class="input-group">
                    <label>Ramal</label>
                    <input type="text" name="ramal" value="{{ f.ramal }}" required>
                </div>

                <button type="submit" class="btn-login" style="margin-top: 15px;">Salvar Alterações</button>
            </form>
        </div>
    </div>

</body>
</html>
